stages:
  - test
  - report

variables:
  DOCKER_TLS_CERTDIR: ""
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

cache:
  key: "${CI_COMMIT_REF_SLUG}-maven"
  paths:
    - .m2/repository/

api-tests:
  stage: test
  image: docker:27.3.1
  services:
    - name: docker:27.3.1-dind
      command: ["--tls=false"]
  before_script:
    - apk add --no-cache docker-cli-compose
  script:
    - docker compose version
    - docker compose up --abort-on-container-exit --exit-code-from tests
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - target/allure-results/
      - target/surefire-reports/

allure-report:
  stage: report
  image: eclipse-temurin:17-jre
  needs:
    - job: api-tests
      artifacts: true
  when: always
  script:
    - wget -q https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
    - tar -xzf allure-2.29.0.tgz
    - ./allure-2.29.0/bin/allure generate target/allure-results -o target/allure-report --clean
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - target/allure-report/
