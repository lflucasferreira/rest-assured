name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: Test profile to run
        required: true
        default: full
        type: choice
        options:
          - full
          - owners
          - pets

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  API_BASE_URI: http://localhost:9966/petclinic/api
  MAVEN_OPTS: -Dmaven.repo.local=${{ github.workspace }}/.m2/repository

jobs:
  test:
    name: API — full (CI gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      petclinic:
        image: springcommunity/spring-petclinic-rest:latest
        ports:
          - 9966:9966
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Verify Petclinic API is reachable
        run: |
          for attempt in $(seq 1 30); do
            if curl -sf "${API_BASE_URI%/api}/actuator/health" | grep -q '"status":"UP"'; then
              echo "Petclinic API is ready"
              exit 0
            fi
            echo "Waiting for Petclinic API... (${attempt}/30)"
            sleep 10
          done
          echo "Petclinic API did not become ready in time" >&2
          exit 1

      - name: Run API tests
        env:
          CI: "true"
        run: mvn -B clean test -Denv=dev -Dapi.base.uri="${API_BASE_URI}"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-reports
          path: |
            target/allure-results/
            target/surefire-reports/
          if-no-files-found: ignore

  test-manual:
    name: API — ${{ github.event.inputs.profile || 'skipped' }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      petclinic:
        image: springcommunity/spring-petclinic-rest:latest
        ports:
          - 9966:9966
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Verify Petclinic API is reachable
        run: |
          for attempt in $(seq 1 30); do
            if curl -sf "${API_BASE_URI%/api}/actuator/health" | grep -q '"status":"UP"'; then
              echo "Petclinic API is ready"
              exit 0
            fi
            echo "Waiting for Petclinic API... (${attempt}/30)"
            sleep 10
          done
          echo "Petclinic API did not become ready in time" >&2
          exit 1

      - name: Run API tests — selected profile
        env:
          CI: "true"
        run: |
          case "${{ github.event.inputs.profile }}" in
            owners)
              mvn -B clean test -Denv=dev -Dapi.base.uri="${API_BASE_URI}" -Dtest=OwnersApiTest
              ;;
            pets)
              mvn -B clean test -Denv=dev -Dapi.base.uri="${API_BASE_URI}" -Dtest=PetsApiTest
              ;;
            *)
              mvn -B clean test -Denv=dev -Dapi.base.uri="${API_BASE_URI}"
              ;;
          esac

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-reports-${{ github.event.inputs.profile }}
          path: |
            target/allure-results/
            target/surefire-reports/
          if-no-files-found: ignore

  publish-pages:
    name: Build report & publish GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    services:
      petclinic:
        image: springcommunity/spring-petclinic-rest:latest
        ports:
          - 9966:9966
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Verify Petclinic API is reachable
        run: |
          for attempt in $(seq 1 30); do
            if curl -sf "${API_BASE_URI%/api}/actuator/health" | grep -q '"status":"UP"'; then
              echo "Petclinic API is ready"
              exit 0
            fi
            echo "Waiting for Petclinic API... (${attempt}/30)"
            sleep 10
          done
          echo "Petclinic API did not become ready in time" >&2
          exit 1

      - name: Run API tests and generate Allure report
        env:
          CI: "true"
        run: |
          mvn -B clean test -Denv=dev -Dapi.base.uri="${API_BASE_URI}"
          wget -q https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure-2.29.0.tgz
          ./allure-2.29.0/bin/allure generate target/allure-results -o site --clean
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
