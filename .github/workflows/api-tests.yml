name: Rest Assured Automation Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  API_BASE_URI: http://localhost:9966/petclinic/api
  API_SECURE_BASE_URI: http://localhost:9967/petclinic/api
  MAVEN_OPTS: -Dmaven.repo.local=${{ github.workspace }}/.m2/repository

jobs:
  test:
    name: Rest Assured — full (CI gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      petclinic:
        image: springcommunity/spring-petclinic-rest:latest
        ports:
          - 9966:9966
      petclinic-secure:
        image: springcommunity/spring-petclinic-rest:latest
        ports:
          - 9967:9966
        env:
          PETCLINIC_SECURITY_ENABLE: true
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Verify Petclinic API is reachable
        run: |
          for attempt in $(seq 1 30); do
            if curl -sf "${API_BASE_URI%/api}/actuator/health" | grep -q '"status":"UP"'; then
              echo "Petclinic API is ready"
              break
            fi
            echo "Waiting for Petclinic API... (${attempt}/30)"
            sleep 10
          done
          if ! curl -sf "${API_BASE_URI%/api}/actuator/health" | grep -q '"status":"UP"'; then
            echo "Petclinic API did not become ready in time" >&2
            exit 1
          fi
          for attempt in $(seq 1 30); do
            if curl -sf -o /dev/null -w "%{http_code}" "${API_SECURE_BASE_URI}/owners" | grep -qE '401|403'; then
              echo "Secure Petclinic API is ready"
              exit 0
            fi
            echo "Waiting for secure Petclinic API... (${attempt}/30)"
            sleep 10
          done
          echo "Secure Petclinic API did not become ready in time" >&2
          exit 1

      - name: Run test suite
        env:
          CI: "true"
        run: mvn -B clean test -Denv=dev -Dapi.base.uri="${API_BASE_URI}" -Dapi.secure.base.uri="${API_SECURE_BASE_URI}"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-api
          path: target/allure-results/
          if-no-files-found: ignore

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-api
          path: target/surefire-reports/
          if-no-files-found: ignore

  publish-pages:
    name: Build site & publish GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build GitHub Pages site
        run: npm run pages:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-allure:
    name: Publish Allure report to GitHub Pages
    runs-on: ubuntu-latest
    env:
      CI: "true"
    needs:
      - test
      - publish-pages
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Download Allure results (api)
        if: always()
        uses: actions/download-artifact@v7
        with:
          name: allure-results-api
          path: allure-results-staging/allure-results-api
        continue-on-error: true

      - name: Merge Allure results
        if: always()
        run: npm run allure:merge-results

      - name: Prepare Allure report for Pages
        if: always()
        run: npm run pages:prepare-allure
        continue-on-error: true

      - name: Build GitHub Pages site
        run: npm run pages:build

      - name: Delete previous Pages artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ids="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" \
            --jq '.artifacts[] | select(.name == "github-pages") | .id')"
          if [ -z "$ids" ]; then
            echo "No github-pages artifact to delete"
            exit 0
          fi
          for id in $ids; do
            echo "Deleting artifact ${id}"
            gh api -X DELETE "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${id}"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-pages
          path: |
            allure-report/
            allure-results/
            pages-allure-staging/
            site/report/
          if-no-files-found: ignore
